name: "KT-Agent: Notify Reviewer"

on:
  push:
    branches:
      - main
    paths:
      - "KT-Agent/output/KT-Doc-*.md"

jobs:
  notify-reviewer:
    name: Notify Reviewer of New KT Document
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if a new KT doc exists (not a delete-only commit)
        id: kt-doc
        run: |
          # Find the latest KT doc in output folder
          DOC_FILE=$(find KT-Agent/output -name "KT-Doc-*.md" | sort | tail -1)

          if [ -n "$DOC_FILE" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
            echo "doc_file=$DOC_FILE" >> $GITHUB_OUTPUT
            echo "doc_name=$(basename $DOC_FILE)" >> $GITHUB_OUTPUT
            echo "doc_url=https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/$DOC_FILE" >> $GITHUB_OUTPUT
            echo "commit_url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "✅ KT doc found: $DOC_FILE"
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No KT doc found — skipping notification."
          fi

      - name: Create reviewer notification issue
        if: steps.kt-doc.outputs.should_notify == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const docName   = "${{ steps.kt-doc.outputs.doc_name }}";
            const docUrl    = "${{ steps.kt-doc.outputs.doc_url }}";
            const commitUrl = "${{ steps.kt-doc.outputs.commit_url }}";
            const reviewer  = "${{ vars.KT_REVIEWER }}";

            const body = [
              "## 📘 KT Document Ready for Review",
              "",
              reviewer ? `@${reviewer} — a new Knowledge Transfer document has been generated and committed.` : "A new Knowledge Transfer document has been generated and committed.",
              "",
              `**Document:** [${docName}](${docUrl})`,
              `**Commit:** ${commitUrl}`,
              `**Generated at:** ${new Date().toISOString()}`,
              "",
              "### What to review",
              "- [ ] Architecture diagram is accurate",
              "- [ ] All REST endpoints are listed correctly",
              "- [ ] Data models reflect current entity structure",
              "- [ ] Exception handling section is complete",
              "- [ ] How-to-run instructions work",
              "",
              "Please review the document and close this issue once approved.",
              "",
              "---",
              "_Auto-created by KT-Agent GitHub Actions workflow_"
            ].join("\n");

            const issuePayload = {
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `[KT-Agent] Review requested: ${docName}`,
              body,
              labels: ["kt-review", "documentation"],
            };

            if (reviewer) issuePayload.assignees = [reviewer];

            const issue = await github.rest.issues.create(issuePayload);
            console.log(`📬 Review issue created: ${issue.data.html_url}`);
            core.summary.addRaw(`### 📬 Reviewer Notified\n[View Issue](${issue.data.html_url})`);
            await core.summary.write();